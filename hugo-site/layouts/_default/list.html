{{ define "main" }}
<section class="section-shell">
  <h1>{{ .Title }}</h1>
  {{ .Content }}
  {{ range .Pages }}
    <article class="paper-card">
      <h2><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
      {{ with .Params.abstract }}<p>{{ . }}</p>{{ end }}
    </article>
  {{ end }}
</section>
{{ end }}
